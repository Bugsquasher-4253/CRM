version: "3.9"

services:
  web:
    image: ghcr.io/bugsquasher-4253/crm:${IMAGE_TAG:-prod}
    build: .
    container_name: crefio_web
    restart: always
    ports:
      - "127.0.0.1:8011:8000"
    env_file: .env
    environment:
      - MEDIA_ROOT=/app/attendance_project/media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Run this container WITHOUT the docker-default AppArmor profile. On this
    # host the snap Docker daemon is AppArmor-confined and the docker-default
    # profile refuses signals from peer "snap.docker.dockerd", so the daemon
    # can't cleanly stop/restart the container (signal: permission denied) and
    # `restart: always` is unreliable. Removing the container's profile drops
    # that receiver-side check, so the daemon can signal it normally. Scoped to
    # this service only; the crefio_*_dev stack is unaffected.
    security_opt:
      - apparmor=unconfined
    volumes:
      - media_data:/app/attendance_project/media

volumes:
  media_data:

# Pin the project network to a fixed subnet so the container's IP stays in a
# known range. The host firewall (ufw) and Postgres pg_hba.conf both allow
# 172.18.0.0/16 — without this pin Docker could reassign a different subnet on
# network recreate and silently break the DB connection.
networks:
  default:
    ipam:
      config:
        - subnet: 172.18.0.0/16
