version: "3.9"

services:
  web:
    image: ghcr.io/bugsquasher-4253/crm:${IMAGE_TAG:-prod}
    build: .
    container_name: crefio_web
    restart: always
    ports:
      - "127.0.0.1:8011:8000"
    env_file: .env
    environment:
      - MEDIA_ROOT=/app/attendance_project/media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - media_data:/app/attendance_project/media

volumes:
  media_data:

# Pin the project network to a fixed subnet so the container's IP stays in a
# known range. The host firewall (ufw) and Postgres pg_hba.conf both allow
# 172.18.0.0/16 — without this pin Docker could reassign a different subnet on
# network recreate and silently break the DB connection.
networks:
  default:
    ipam:
      config:
        - subnet: 172.18.0.0/16
