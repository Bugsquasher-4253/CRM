version: "3.9"

services:
  web:
    image: ghcr.io/bugsquasher-4253/crm:${IMAGE_TAG:-prod}
    build: .                          # local dev ke liye: docker compose up --build
    container_name: crefio_web
    restart: always
    env_file: .env                    # DATABASE_URL, SECRET_KEY, ALLOWED_HOSTS ...
    environment:
      - MEDIA_ROOT=/app/attendance_project/media
    extra_hosts:
      - "host.docker.internal:host-gateway"   # host ke PostgreSQL tak pahuchne ke liye
    volumes:
      - media_data:/app/attendance_project/media

  nginx:
    image: nginx:1.27-alpine
    container_name: crefio_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/media:ro
    depends_on:
      - web

volumes:
  media_data:
