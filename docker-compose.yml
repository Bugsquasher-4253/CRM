version: "3.9"

services:
  web:
    build: .
    container_name: crefio_web
    restart: always
    # No host port exposed — Nginx reaches web via Docker network (web:8000)
    # This prevents "port already in use" errors on the host completely
    expose:
      - "8000"
    env_file:
      - .env                                     # user's .env on server
    environment:
      - MEDIA_ROOT=/app/attendance_project/media  # must match volume mount below
    extra_hosts:
      - "host.docker.internal:host-gateway"      # reach host PostgreSQL at localhost
    volumes:
      - media_data:/app/attendance_project/media  # persistent media uploads

  nginx:
    image: nginx:1.27-alpine
    container_name: crefio_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/media:ro
    depends_on:
      - web

volumes:
  media_data:
