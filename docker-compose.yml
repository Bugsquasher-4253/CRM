version: "3.9"

services:
  web:
    build: .
    container_name: crefio_web
    restart: always
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - MEDIA_ROOT=/app/attendance_project/media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - media_data:/app/attendance_project/media

  nginx:
    build: ./nginx                          # nginx config baked into image
    container_name: crefio_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - media_data:/media:ro               # media files only, no host config file
    depends_on:
      - web

volumes:
  media_data:
