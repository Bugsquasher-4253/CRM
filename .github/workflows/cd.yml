# Build image on GitHub runners → push to GHCR → SSH to server → pull & run
# Server never builds — faster deploy, no build load on production.
#
# One-time server setup (run manually ONCE):
#   sudo docker compose down --remove-orphans
#   sudo usermod -aG docker $USER
#   newgrp docker
#
# Secrets needed: SSH_HOST, SSH_USER, SSH_KEY
name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-prod
  cancel-in-progress: false

jobs:
  # ── JOB 1: Build image on GitHub and push to GHCR ─────────────────────────
  build-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:prod
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── JOB 2: SSH to server, pull new image, restart ─────────────────────────
  deploy:
    name: Deploy to Production
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     22
          script: |
            set -e
            cd /var/www/hrms

            echo "── [1/4] Pull latest code ──"
            git fetch origin main
            git reset --hard origin/main

            echo "── [2/4] Pull image from GHCR & restart ──"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin
            docker compose pull

            # Recreate the stack. The snap Docker daemon on this host is blocked
            # by AppArmor from signalling its own containers, so a normal stop
            # fails ("cannot stop container: permission denied") and a recreate
            # leaves renamed orphans like <hash>_crefio_web that collide on the
            # next deploy. If `up` fails, force-kill EVERY crefio_web* container by
            # PID (an unconfined root signal AppArmor doesn't restrict), remove
            # them all, then recreate clean. All scoped to the crefio_web name —
            # the other project's containers on this host are never matched.
            if ! docker compose up -d --remove-orphans; then
              echo "compose up failed — force-clearing all crefio_web containers"
              for c in $(docker ps -aq --filter "name=crefio_web"); do
                PID=$(docker inspect -f '{{.State.Pid}}' "$c" 2>/dev/null || true)
                if [ -n "$PID" ] && [ "$PID" != "0" ]; then
                  sudo kill -9 "$PID" || true
                fi
              done
              sleep 2
              docker ps -aq --filter "name=crefio_web" | xargs -r docker rm -f || true
              docker compose up -d --force-recreate --remove-orphans
            fi

            echo "── [3/4] Migrate ──"
            sleep 8
            docker compose exec -T web \
              python attendance_project/manage.py migrate --no-input

            echo "── [4/4] Cleanup ──"
            docker image prune -f

            echo "✅ Done"
