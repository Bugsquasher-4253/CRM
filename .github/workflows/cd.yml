name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     22
          script: |
            set -e
            cd /var/www/hrms

            echo "── [1/5] Pull latest code ──"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd attendance_project/staticfiles/ 2>/dev/null || true

            echo "── [2/5] Build Docker image ──"
            docker compose build

            echo "── [3/5] Free ports and restart containers ──"

            # Step A: Stop ALL Docker containers (any name, any project)
            docker stop $(docker ps -q) 2>/dev/null || true
            docker rm -f $(docker ps -aq) 2>/dev/null || true

            # Step B: Kill any systemd/host service on port 8000 or 80
            # Uses 'ss' which is always available on Linux (no extra packages needed)
            ss -tlnp 'sport = :8000' 2>/dev/null \
              | grep -oP 'pid=\K[0-9]+' | xargs -r kill -9 2>/dev/null || true
            ss -tlnp 'sport = :80' 2>/dev/null \
              | grep -oP 'pid=\K[0-9]+' | xargs -r kill -9 2>/dev/null || true

            # Step C: Also try fuser in case it is installed
            fuser -k 8000/tcp 2>/dev/null || true
            fuser -k 80/tcp   2>/dev/null || true

            # Step D: Give OS 3 seconds to fully release the ports
            sleep 3

            # Step E: Clean compose state and start fresh
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d

            echo "── [4/5] Migrate & collectstatic ──"
            sleep 10
            docker compose exec -T web python attendance_project/manage.py migrate --no-input
            docker compose exec -T web python attendance_project/manage.py collectstatic --no-input || true

            echo "── [5/5] Cleanup ──"
            docker image prune -f

            echo "✅ Done"
