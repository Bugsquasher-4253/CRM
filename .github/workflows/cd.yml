name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     22
          script: |
            set -e
            cd /var/www/hrms

            echo "── [1/5] Pull latest code ──"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd attendance_project/staticfiles/ 2>/dev/null || true

            echo "── [2/5] Build Docker image ──"
            docker compose build

            echo "── [3/5] Clean up old containers and start fresh ──"
            # Force-remove containers by exact name (works even with permission issues)
            docker rm -f crefio_web   2>/dev/null || true
            docker rm -f crefio_nginx 2>/dev/null || true
            # Stop and remove ALL remaining containers
            docker stop $(docker ps -q) 2>/dev/null || true
            docker rm -f $(docker ps -aq) 2>/dev/null || true
            # Kill any host process on port 80 (ss is always on Linux)
            ss -tlnp 'sport = :80' 2>/dev/null \
              | grep -oP 'pid=\K[0-9]+' | xargs -r kill -9 2>/dev/null || true
            # Wait for OS to release ports
            sleep 3
            # Start fresh
            docker compose up -d

            echo "── [4/5] Migrate & collectstatic ──"
            sleep 10
            docker compose exec -T web python attendance_project/manage.py migrate --no-input
            docker compose exec -T web python attendance_project/manage.py collectstatic --no-input || true

            echo "── [5/5] Cleanup ──"
            docker image prune -f

            echo "✅ Done"
